<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Dönüşüm getiren açılış sayfası">
  <defs>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="90" />
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0c10" />
      <stop offset="1" stop-color="#08080a" />
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" />
  <ellipse cx="170" cy="110" rx="280" ry="210" fill="#d8cba6" opacity="0.18" filter="url(#soft)" />
  <ellipse cx="1060" cy="640" rx="320" ry="240" fill="#b7a87e" opacity="0.12" filter="url(#soft)" />

  <!-- eyebrow -->
  <text x="80" y="120" fill="#d8cba6" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" font-size="21" letter-spacing="6">REHBER · DÖNÜŞÜM</text>
  <rect x="80" y="140" width="64" height="3" rx="1.5" fill="#d8cba6" />

  <!-- title -->
  <text x="76" y="350" fill="#f5f5f3" font-family="Inter, Arial, Helvetica, sans-serif" font-size="88" font-weight="600" letter-spacing="-2">Dönüşüm getiren</text>
  <text x="76" y="462" fill="#d8cba6" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="98" letter-spacing="-2">açılış sayfası.</text>

  <!-- footer -->
  <text x="80" y="612" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30" font-weight="700" letter-spacing="2" fill="#f5f5f3">CAWELT<tspan fill="#8a8a92" font-size="18" font-weight="400" letter-spacing="1"> /studio</tspan></text>
  <text x="1120" y="612" text-anchor="end" font-family="ui-monospace, monospace" font-size="20" fill="#8a8a92">cawelt.com/blog</text>
</svg>
